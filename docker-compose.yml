version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: complaint_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8080
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=complaint_db
      - DB_USERNAME=complaint_user
      - DB_PASSWORD=secret
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: complaint_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: complaint_db
      POSTGRES_USER: complaint_user
      POSTGRES_PASSWORD: secret
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U complaint_user -d complaint_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
