# 1. Tambahkan user di baris paling atas agar sesuai dengan Dockerfile kamu
user www-data; 
worker_processes auto; # Mengikuti jumlah CPU yang tersedia di Koyeb
daemon off;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    # Tambahkan log error untuk mempermudah debugging di Koyeb
    error_log /dev/stderr warn;
    access_log /dev/stdout;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 8080 default_server;
        server_name _;
        root /var/www/public;
        index index.php index.html;

        # Header keamanan tambahan
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Pastikan bagian ini presisi
        location ~ \.php$ {
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            # Tetap gunakan 127.0.0.1:9000 jika PHP-FPM dikonfigurasi TCP
            fastcgi_pass 127.0.0.1:9000; 
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
        }

        location ~ /\.(?!well-known).* {
            deny all;
        }
    }
}